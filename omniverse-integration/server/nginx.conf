# Public-facing nginx for Omniverse Kit App Streaming.
# Proxies wss://omniverse.qubitpage.com/signaling → kit-app:8211
# Proxies WebRTC media (UDP) handled at the host firewall level, not here.

events { worker_connections 1024; }

http {
  upgrade_map_default_upgrade $http_upgrade $upgrade_connection;
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name omniverse.qubitpage.com;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name omniverse.qubitpage.com;

    ssl_certificate     /etc/letsencrypt/live/omniverse.qubitpage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/omniverse.qubitpage.com/privkey.pem;

    # Only atlas.qubitpage.com is allowed to embed the stream
    add_header Content-Security-Policy "frame-ancestors https://atlas.qubitpage.com;" always;
    add_header X-Frame-Options "ALLOW-FROM https://atlas.qubitpage.com" always;

    # WebSocket signaling endpoint consumed by streaming-client.js
    location /signaling {
      proxy_pass http://kit-app:8211;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Vendor the NVIDIA streaming-client JS so the cockpit can load it same-origin
    location /streaming-client.js {
      alias /usr/share/nginx/html/streaming-client.js;
      add_header Cache-Control "public, max-age=300";
    }

    # Health
    location = /healthz { return 200 "ok\n"; }
  }
}
